<!doctype html>
<html lang="en">
<head>
    <title>Sage To-Do List</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="confetti-container"></div>

<main class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">

            <!-- Title -->
            <h2> My To-Do List</h2>
            <p class="subtitle">stay calm, stay productive</p>

            <!-- Counters -->
            <h5 id="taskCounter">Tasks: 0</h5>
            <h6 id="completedCounter">Completed: 0</h6>

            <!-- Input -->
            <div class="row mt-3">
                <div class="col-8">
                    <input type="text" id="taskInput" class="form-control" placeholder="Enter a task...">
                </div>
                <div class="col-4">
                    <button id="addTaskBtn" class="btn btn-primary w-100">Add</button>
                </div>
            </div>

            <!-- Task List -->
            <ul id="taskList" class="list-group mt-3"></ul>

            <!-- Clear Button -->
            <button id="clearTasksBtn" class="btn btn-danger w-100 mt-3">
                Clear All Tasks
            </button>

        </div>
    </div>
</main>

<script src="script.js"></script>

</body>
</html>
